<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tracker</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { margin:0; font-family:system-ui; background:#000; color:#fff; padding:16px; }
.container { max-width:520px; margin:auto; }
input, button, select {
  width:100%; padding:10px; margin-top:6px;
  border-radius:10px; border:none; font-size:15px;
}
input { background:#1f1f1f; color:#fff; }
button { background:#fff; color:#000; font-weight:600; }
.card { background:#111; padding:10px; border-radius:12px; margin-top:10px; }
.row { display:flex; gap:6px; }
.small { font-size:12px; opacity:.6; }
h2 { margin:6px 0 10px; }
</style>
</head>

<body>
<div class="container">

<h2>Tracker</h2>

<div class="row">
<button onclick="setView('main')">Log</button>
<button onclick="setView('graph')">Graph</button>
</div>

<div id="mainView">

<input id="weightInput" placeholder="Weight (lbs)">
<button onclick="addWeight()">Add Weight</button>

<input id="doseInput" placeholder="Dose (mg)">
<button onclick="addInjection()">Add Injection</button>

<div class="card" id="insights"></div>
<div id="entries"></div>

</div>

<div id="graphView" style="display:none">

<select id="range" onchange="renderGraph()">
<option value="7">7d</option>
<option value="14">14d</option>
<option value="30" selected>30d</option>
<option value="all">All</option>
</select>

<canvas id="chart" height="220"></canvas>

</div>

</div>

<script>

// ---------- DATA MODEL ----------
const HALF_LIFE_HOURS = 120;
const k = Math.log(2)/HALF_LIFE_HOURS;

let weights = load("weights", []);
let injections = load("injections", []);
let view = "main";

function load(k,f){ try{return JSON.parse(localStorage.getItem(k))||f}catch{return f} }
function save(k,v){ localStorage.setItem(k,JSON.stringify(v)) }

function id(){ return Math.random().toString(36).slice(2) }

// ---------- ADD ----------
function addWeight(){
  const v = parseFloat(weightInput.value);
  if(!v) return;

  weights.push({
    id:id(),
    weight:v,
    timestamp:new Date().toISOString()
  });

  save("weights",weights);
  weightInput.value="";
  render();
}

function addInjection(){
  const v = parseFloat(doseInput.value);
  if(!v) return;

  injections.push({
    id:id(),
    dose:v,
    timestamp:new Date().toISOString(),
    source:"manual"
  });

  save("injections",injections);
  doseInput.value="";
  render();
}

// ---------- PHARMA MODEL ----------
function calcLevelAt(t){
  let total=0;
  injections.forEach(i=>{
    const dt=(t - new Date(i.timestamp))/3600000;
    if(dt>=0) total += i.dose * Math.exp(-k*dt);
  });
  return total;
}

// ---------- GRAPH ----------
let chart;

function renderGraph(){

  const range = rangeSelect();
  const now = Date.now();
  const start = range==="all"
    ? Math.min(...weights.map(w=>new Date(w.timestamp)))
    : now - range*86400000;

  const data=[];
  for(let t=start; t<=now; t+=3600000){
    const weight = latestWeight(t);
    const level = calcLevelAt(t);

    data.push({
      x:new Date(t),
      weight,
      level
    });
  }

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"),{
    type:"line",
    data:{
      datasets:[
        {
          label:"Weight",
          data:data.map(d=>({x:d.x,y:d.weight})),
          borderColor:"#8884d8",
          tension:.3,
          yAxisID:"y"
        },
        {
          label:"Medication",
          data:data.map(d=>({x:d.x,y:d.level})),
          borderColor:"#82ca9d",
          tension:.3,
          yAxisID:"y1"
        }
      ]
    },
    options:{
      responsive:true,
      interaction:{mode:"nearest",intersect:false},
      scales:{
        x:{type:"time",time:{unit:"day"}},
        y:{position:"left"},
        y1:{position:"right"}
      }
    }
  });
}

function latestWeight(t){
  const list = weights.filter(w=>new Date(w.timestamp)<=t);
  return list.length ? list[list.length-1].weight : null;
}

function rangeSelect(){
  const r=document.getElementById("range").value;
  return r==="all" ? "all" : parseInt(r);
}

// ---------- INSIGHTS ----------
function renderInsights(){

  if(weights.length<2){
    insights.innerHTML="Add data to see trends";
    return;
  }

  const last = weights[weights.length-1];
  const prev = weights[weights.length-2];

  const diff = (last.weight - prev.weight).toFixed(1);

  insights.innerHTML = `
    Change: ${diff} lbs<br>
    Current Level: ${calcLevelAt(Date.now()).toFixed(2)}
  `;
}

// ---------- LIST ----------
function renderList(){

  entries.innerHTML="";

  [...weights].reverse().forEach(w=>{
    const div=document.createElement("div");
    div.className="card";

    div.innerHTML = `
      ${new Date(w.timestamp).toLocaleString()}<br>
      ${w.weight} lbs
    `;

    entries.appendChild(div);
  });
}

// ---------- VIEW ----------
function setView(v){
  view=v;
  mainView.style.display = v==="main"?"block":"none";
  graphView.style.display = v==="graph"?"block":"none";

  if(v==="graph") renderGraph();
}

// ---------- RENDER ----------
function render(){
  renderInsights();
  renderList();
}

render();

</script>

</body>
</html>
